name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task check
      - run: deno task test

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      # Validate the Worker bundle + bindings without deploying. The client
      # bundle must exist first (assets directory).
      - run: |
          curl -fsSL https://deno.land/install.sh | sh
          "$HOME/.deno/bin/deno" task --cwd .. bundle
      - run: npx wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: "dry-run"
